<body>

<header>
    <button id="menu-btn" onclick="openAdminModal()">☰</button>
    <div id="user-title" style="font-weight:800;color:var(--p);font-size:18px;text-shadow:0 1px 2px rgba(0,0,0,0.5)">كأس التوقعات</div>

<div class="container">

        <input type="password" id="auth-pass" placeholder="كلمة المرور">
        <button id="auth-main-btn" onclick="handleAuth()">دخول الفخامة</button>
        <button id="auth-toggle-btn" style="background:none;color:var(--text-muted);font-size:14px;box-shadow:none" onclick="toggleAuthMode()">إنشاء حساب جديد</button>
    </div>
    <div id="main-screen" class="hidden">
        <div id="groups-container"></div>
    </div>
</div>

<div id="profile-screen" class="full-page-modal hidden">
    <div class="modal-header">
        <h3 style="margin:0;color:var(--p)">صفحة الملف الشخصي</h3>
        <button class="modal-close-btn" onclick="closeProfileModal()">خروج</button>
    </div>
    <div style="background:var(--card);padding:20px;border-radius:16px;border:1px solid rgba(212,175,55,0.2)">
        <p style="font-size:18px">اسم المستخدم: <strong id="prof-username" style="color:var(--p)"></strong></p>
        <hr style="border:none;border-top:1px solid #334155;margin:20px 0">
        <button onclick="logout()" style="background:#64748b;color:#fff;box-shadow:none">تسجيل الخروج من الحساب</button>
        <button onclick="deleteAccount()" style="background:#ef4444;color:#fff;margin-top:15px;box-shadow:none">حذف الحساب نهائياً</button>
    </div>
</div>

<div id="admin-screen" class="full-page-modal hidden">
    <div class="modal-header">
        <h3 style="margin:0;color:var(--p)">لوحة الإدارة والمجموعات</h3>
        <button class="modal-close-btn" onclick="closeAdminModal()">خروج</button>
    </div>
    <div style="background:var(--card);padding:20px;border-radius:16px;border:1px solid rgba(212,175,55,0.2)">
        <h4 style="margin-top:0;color:var(--p)">إدخال بيانات المجموعات الجديدة</h4>
        <textarea id="json-input" rows="5" placeholder="أدخل كود JSON للمجموعات هنا..."></textarea>
        <button onclick="addJsonGroups()">إضافة وتحديث المجموعات</button>
        <hr style="border:none;border-top:1px solid #334155;margin:25px 0">
        <h4 style="color:var(--p)">إدارة المجموعات وتثبيت التوقعات</h4>
        <div id="admin-management-area"></div>
    </div>
</div>
